<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Varshini 💖</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    overflow: hidden;
    color: white;
}

/* Glass card */
.glass {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

/* Name highlight */
.name {
    color: #fff700;
    font-weight: bold;
}

/* Floating hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>

</head>

<body>

<!-- 🎶 Background Music -->
<audio id="bgMusic" loop>
    <source src="your-song.mp3" type="audio/mpeg">
</audio>

<div class="container d-flex flex-column justify-content-center align-items-center vh-100 text-center">

    <div class="glass p-4 rounded-4">
        <h1 class="display-5">💖 Hey <span class="name">Varshini</span> 💖</h1>
        <p class="lead">I have something special to ask you...</p>
        <h2>Will you be my Valentine? 🥺</h2>

        <div class="mt-3 position-relative">
            <button id="yesBtn" class="btn btn-success btn-lg me-2">Yes 😍</button>
            <button id="noBtn" class="btn btn-danger btn-lg position-absolute">No 😅</button>
        </div>
    </div>

</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const music = document.getElementById("bgMusic");

// Play music on first interaction (mobile fix)
document.body.addEventListener("click", () => {
    music.play();
}, { once: true });

// Move "No" button
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * window.innerWidth - 100;
    const y = Math.random() * window.innerHeight - 50;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// Yes button click
yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
        <div class="d-flex flex-column justify-content-center align-items-center vh-100 text-center">
            <h1>Yayyyy Varshini!!! 💖😍</h1>
            <p>You just made me the happiest person ever 🥹</p>
            <h2>I love you ❤️</h2>
        </div>
    `;
});

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
